services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tenant
      POSTGRES_PASSWORD: tenant
      POSTGRES_DB: tenant_forge
    ports:
      - "5432:5432"
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tenant_forge
      MYSQL_USER: tenant
      MYSQL_PASSWORD: tenant
    ports:
      - "3306:3306"
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
